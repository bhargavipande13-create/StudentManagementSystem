{% extends "base.html" %}

{% block content %}

<h2>Edit Student</h2>

<form method="POST">

<div class="mb-3">
<label>Name</label>

<input
class="form-control"
type="text"
name="name"
value="{{ student[1] }}"
required>

</div>

<div class="mb-3">

<label>Course</label>

<input
class="form-control"
type="text"
name="course"
value="{{ student[2] }}"
required>

</div>

<div class="mb-3">

<label>Age</label>

<input
class="form-control"
type="number"
name="age"
value="{{ student[3] }}"
required>

</div>

<button class="btn btn-success">

Update Student

</button>

</form>

{% endblock %}
