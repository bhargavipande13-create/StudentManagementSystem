{% extends "base.html" %}

{% block content %}

<h2>Students</h2>

<table class="table table-striped table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Course</th>

<th>Age</th>

<th>Actions</th>

</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>

<td>{{ student[1] }}</td>

<td>{{ student[2] }}</td>

<td>{{ student[3] }}</td>

<td>
    <a class="btn btn-warning btn-sm"
       href="/edit/{{ student[0] }}">
       ✏️ Edit
    </a>

    <a class="btn btn-danger btn-sm"
       href="/delete/{{ student[0] }}">
       🗑️ Delete
    </a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
