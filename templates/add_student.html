<!DOCTYPE html>
<html>

<head>
    <title>Add Student</title>
</head>

<body>

    {% extends "base.html" %}

{% block content %}

<h2>Add Student</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
class="form-control"
type="text"
name="name"
required>

</div>

<div class="mb-3">

<label>Course</label>

<input
class="form-control"
type="text"
name="course"
required>

</div>

<div class="mb-3">

<label>Age</label>

<input
class="form-control"
type="number"
name="age"
required>

</div>

<button class="btn btn-primary">
Save Student
</button>

</form>

{% endblock %}
